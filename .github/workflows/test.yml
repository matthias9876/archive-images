name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test -v ./...

      - name: Build (quick check all platforms)
        run: |
          for OS in linux darwin windows; do
            for ARCH in amd64 arm64; do
              echo "Building $OS/$ARCH..."
              GOOS=$OS GOARCH=$ARCH go build -o /tmp/archive-images-$OS-$ARCH ./cmd/archive-images 2>&1 || echo "Note: Some combinations may not work on this runner"
            done
          done
